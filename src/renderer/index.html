<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Whispers In The Void</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
      #app { position: fixed; inset: 0; }

      /*
       * Game UI scrollbars — thin cyan chrome matching HUD / panel borders.
       * Covers docking lists, inventory, maps, menus, overview, etc.
       * Elements with scrollbar-width:none (e.g. toast strips) still hide.
       */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(var(--ui-ar),var(--ui-ag),var(--ui-ab), 0.5) rgba(var(--ui-bg-track-r),var(--ui-bg-track-g),var(--ui-bg-track-b), 0.92);
      }
      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-track {
        background: rgba(var(--ui-bg-track-r),var(--ui-bg-track-g),var(--ui-bg-track-b), 0.9);
        border: 1px solid rgba(var(--ui-ar),var(--ui-ag),var(--ui-ab), 0.22);
        border-radius: 6px;
        box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.45);
      }
      *::-webkit-scrollbar-thumb {
        background: linear-gradient(
          180deg,
          rgba(var(--ui-ar),var(--ui-ag),var(--ui-ab), 0.32) 0%,
          rgba(var(--ui-gr),var(--ui-gg),var(--ui-gb), 0.58) 100%
        );
        border: 1px solid rgba(var(--ui-ar),var(--ui-ag),var(--ui-ab), 0.5);
        border-radius: 6px;
        box-shadow: 0 0 8px rgba(var(--ui-gr),var(--ui-gg),var(--ui-gb), 0.28);
      }
      *::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(
          180deg,
          rgba(var(--ui-ar),var(--ui-ag),var(--ui-ab), 0.48) 0%,
          rgba(var(--ui-ar),var(--ui-ag),var(--ui-ab), 0.78) 100%
        );
        border-color: rgba(var(--ui-ar),var(--ui-ag),var(--ui-ab), 0.75);
        box-shadow: 0 0 12px rgba(var(--ui-gr),var(--ui-gg),var(--ui-gb), 0.45);
      }
      *::-webkit-scrollbar-thumb:active {
        background: rgba(var(--ui-ar),var(--ui-ag),var(--ui-ab), 0.7);
        border-color: var(--ui-accent);
      }
      *::-webkit-scrollbar-corner {
        background: rgba(var(--ui-bg-track-r),var(--ui-bg-track-g),var(--ui-bg-track-b), 0.9);
        border: 1px solid rgba(var(--ui-ar),var(--ui-ag),var(--ui-ab), 0.15);
      }
      *::-webkit-scrollbar-button {
        display: none;
        width: 0;
        height: 0;
      }

      /*
       * Subtle rounded corners on game UI chrome.
       * Exception: HUD (and main-menu) canopy L-braces stay sharp.
       */
      :root {
        --ui-radius: 9px;
        --ui-radius-sm: 7px;
        /* Default cyan UI accent (overridden by preferences / UI Colour panel). */
        --ui-hue: 191;
        --ui-accent: #7fe6ff;
        --ui-accent-mid: #6fd8f2;
        --ui-glow: #4fc3d9;
        --ui-text: #cfe3ff;
        --ui-deep: #2e8fa8;
        --ui-key: #a8d8ea;
        --ui-soft: #b8d4f0;
        --ui-muted: #7a9ab8;
        --ui-dim: #7fa8c9;
        --ui-bright: #eaffff;
        --ui-pale: #e8f4ff;
        --ui-ar: 127;
        --ui-ag: 230;
        --ui-ab: 255;
        --ui-gr: 79;
        --ui-gg: 195;
        --ui-gb: 217;
        --ui-tr: 207;
        --ui-tg: 227;
        --ui-tb: 255;
        /* Panel fill (navy) — independent of accent; retinted via UI Colour. */
        --ui-bg-hue: 220;
        --ui-bg-r: 12;
        --ui-bg-g: 20;
        --ui-bg-b: 36;
        --ui-bg2-r: 7;
        --ui-bg2-g: 12;
        --ui-bg2-b: 22;
        --ui-bg-solid: var(--ui-bg-solid);
        --ui-bg-solid-mid: var(--ui-bg-solid-mid);
        --ui-bg-scrim-r: 4;
        --ui-bg-scrim-g: 6;
        --ui-bg-scrim-b: 12;
        --ui-bg-track-r: 8;
        --ui-bg-track-g: 14;
        --ui-bg-track-b: 26;
      }
      #hud .status-panel,
      #hud .velocity-panel,
      #hud .system-label,
      #hud .target-panel,
      #hud #radar .radar-frame,
      #hud .system-scan-btn,
      #hud .bar,
      #radar .radar-frame,
      #system-overview,
      #docking-ui .panel,
      #docking-ui .side-panel,
      #docking-ui button,
      #docking-ui select,
      #docking-ui input,
      #docking-ui textarea,
      #inventory-ui .panel,
      #inventory-ui button,
      #inventory-ui input,
      #inventory-ui .tab,
      #nav-map .panel,
      #nav-map button,
      #nav-map input,
      #system-scan-map .ssm-panel,
      #system-scan-map button,
      #character-ui .panel,
      #character-ui button,
      #character-ui input,
      #character-ui .portrait-frame,
      #character-ui .stat-row,
      #character-ui .ship-stats-panel,
      #missions-ui .panel,
      #missions-ui button,
      #pause-menu .panel,
      #pause-menu button,
      #main-menu .panel,
      #main-menu button,
      #main-menu input,
      #main-menu select,
      #main-menu .new-game-portrait,
      .game-dialog-overlay .game-dialog,
      .game-dialog-overlay .game-dialog button,
      .game-dialog-overlay .game-dialog input,
      #death-screen .panel,
      #death-screen button,
      #datacore-hack .dh-panel,
      #datacore-hack .dh-track,
      #datacore-hack button {
        border-radius: var(--ui-radius);
      }
      #hud .bar,
      #hud .sec-badge,
      #docking-ui .craft-progress,
      #inventory-ui .craft-progress {
        border-radius: var(--ui-radius-sm);
      }
      /* L-shaped canopy braces — stay square */
      #hud .cockpit-frame .corner,
      #main-menu .frame .corner {
        border-radius: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
